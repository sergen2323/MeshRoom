# Автосборка релизов MeshRoom.
# Каждый пуш в main: версия поднимается сама (v0.2.1 → v0.2.2 → ...),
# собираются установщики Windows и macOS и публикуется GitHub-релиз.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  WINTUN_VERSION: "0.14.1"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Next version (auto-bump patch)
        id: v
        run: |
          last=$(git tag -l 'v*' --sort=-v:refname | head -1)
          last=${last:-v0.2.0}
          IFS=. read -r major minor patch <<< "${last#v}"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"
          echo "next version: ${major}.${minor}.$((patch+1)) (previous: $last)"

  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Embed icon into exe (rsrc)
        shell: bash
        run: |
          go run github.com/akavel/rsrc@v0.10.2 \
            -ico build/windows/icon.ico \
            -o cmd/meshroom/rsrc_windows_amd64.syso

      - name: Build meshroom.exe
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-H windowsgui -s -w" -o dist/meshroom.exe ./cmd/meshroom

      - name: Download Wintun
        shell: bash
        run: |
          curl -fsSL -o wintun.zip "https://www.wintun.net/builds/wintun-${WINTUN_VERSION}.zip"
          unzip -j wintun.zip "wintun/bin/amd64/wintun.dll" -d build/windows/

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" /DAppVersion=${{ needs.version.outputs.version }} build\windows\meshroom.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/MeshRoom-*-windows-setup.exe

  macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build .app and .dmg
        run: |
          chmod +x build/macos/make-app.sh
          build/macos/make-app.sh "${{ needs.version.outputs.version }}" universal

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/MeshRoom-*-macos.dmg

  release:
    needs: [version, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish release v${{ needs.version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: MeshRoom ${{ needs.version.outputs.version }}
          files: |
            dist/MeshRoom-*-windows-setup.exe
            dist/MeshRoom-*-macos.dmg
          generate_release_notes: true
